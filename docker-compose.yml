version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: quickbid-postgres
    environment:
      POSTGRES_USER: quickbid
      POSTGRES_PASSWORD: quickbid
      POSTGRES_DB: quickbid
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quickbid"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - quickbid-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quickbid-backend
    environment:
      DATABASE_URL: postgresql://quickbid:quickbid@postgres:5432/quickbid
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      PORT: 3001
      NODE_ENV: production
    ports:
      - "3001:3001"
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - /app/node_modules
    command: >
      sh -c "npx prisma generate &&
             npx prisma db push --accept-data-loss &&
             npm run seed &&
             npx tsx src/index.ts"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - quickbid-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quickbid-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: ws://localhost:3002
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - quickbid-network

volumes:
  postgres_data:

networks:
  quickbid-network:
    driver: bridge
